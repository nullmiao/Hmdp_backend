# Central application config - keep secrets and environment-specific settings in
# application-<profile>.yml files (e.g. application-dev.yml) which should NOT be
# committed to the repository.
# To run with the dev profile locally: mvn spring-boot:run -Dspring-boot.run.profiles=dev
spring:
  profiles:
    active: dev

# Common non-secret defaults
server:
  port: 8081

